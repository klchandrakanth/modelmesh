apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelmesh
  labels:
    app: modelmesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: modelmesh
  template:
    metadata:
      labels:
        app: modelmesh
    spec:
      containers:
        - name: gateway
          image: modelmesh:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: modelmesh-secrets
                  key: openai-api-key
                  optional: true
            - name: MODELMESH_GATEWAY_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: modelmesh-secrets
                  key: gateway-admin-key
            - name: MODELMESH_MODELS_CONFIG_PATH
              value: /app/config/models.yaml
            - name: MODELMESH_ROUTING_CONFIG_PATH
              value: /app/config/routing.yaml
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: modelmesh-config
