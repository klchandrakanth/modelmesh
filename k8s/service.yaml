apiVersion: v1
kind: Service
metadata:
  name: modelmesh
  labels:
    app: modelmesh
spec:
  selector:
    app: modelmesh
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
# To expose externally, change type to LoadBalancer
# or add an Ingress resource pointing to this Service.
