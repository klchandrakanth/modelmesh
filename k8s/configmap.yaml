apiVersion: v1
kind: ConfigMap
metadata:
  name: modelmesh-config
  labels:
    app: modelmesh
data:
  models.yaml: |
    models:
      gpt-4o:
        provider: openai
        context_window: 128000
        cost_per_1k_tokens: 0.005
      gpt-4o-mini:
        provider: openai
        context_window: 128000
        cost_per_1k_tokens: 0.00015
      llama3:
        provider: ollama
        context_window: 8192
        cost_per_1k_tokens: 0.0
      deepseek-coder:
        provider: ollama
        context_window: 16384
        cost_per_1k_tokens: 0.0
      phi3-mini:
        provider: ollama
        context_window: 4096
        cost_per_1k_tokens: 0.0
    defaults:
      chat: llama3
      fallback: gpt-4o-mini
  routing.yaml: |
    routing:
      local_first: true
      intent_map:
        code:
          primary: deepseek-coder
          fallback: gpt-4o
        summarize:
          primary: llama3
          fallback: gpt-4o-mini
        factual:
          primary: llama3
          fallback: gpt-4o-mini
        fast:
          primary: phi3-mini
          fallback: gpt-4o-mini
