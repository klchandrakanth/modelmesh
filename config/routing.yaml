# config/routing.yaml
# Routing policy overrides for semantic (intent-based) routing.
# These supplement the default local-first logic in RuleRouter.

intent_map:
  code:
    primary: llama3.2:3b
    fallback: claude-haiku-4-5
  summarize:
    primary: llama3.2:3b
    fallback: claude-haiku-4-5
  creative:
    primary: claude-sonnet-4-5
    fallback: gpt-4o
  factual:
    primary: llama3.2:3b
    fallback: claude-haiku-4-5
  long_form:
    primary: claude-sonnet-4-5
    fallback: gpt-4o
  fast:
    primary: llama3.2:3b
    fallback: claude-haiku-4-5

policies:
  local_first: true
  max_cost_per_request: 0.10
