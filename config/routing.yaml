# config/routing.yaml
routing:
  local_first: true
  intent_map:
    code:
      primary: deepseek-coder
      fallback: gpt-4o
    summarize:
      primary: llama3
      fallback: gpt-4o-mini
    factual:
      primary: llama3
      fallback: gpt-4o-mini
    fast:
      primary: phi3-mini
      fallback: gpt-4o-mini

  intent_labels:
    code:
      - "Write a Python function"
      - "Fix this bug"
      - "Explain this code"
      - "Implement a REST endpoint"
      - "Debug this error"
    summarize:
      - "Summarize this document"
      - "Give me a TLDR"
      - "Condense this text"
    factual:
      - "What is the capital of France"
      - "Define machine learning"
      - "How does X work"
    fast:
      - "Yes or no"
      - "What time is it"
      - "Complete this sentence"
