services:
  gateway:
    build: .
    image: modelmesh:dev
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - MODELMESH_OLLAMA_BASE_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - MODELMESH_LOG_LEVEL=INFO
      - MODELMESH_ENABLE_METRICS=true
      - MODELMESH_ENABLE_AUTH=${MODELMESH_ENABLE_AUTH:-false}
      - MODELMESH_ENABLE_CACHE=${MODELMESH_ENABLE_CACHE:-false}
      - MODELMESH_REDIS_URL=redis://redis:6379
      - MODELMESH_GATEWAY_ADMIN_KEY=${MODELMESH_GATEWAY_ADMIN_KEY:-dev-admin-key}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://modelmesh:devpassword@postgres/modelmesh}
    volumes:
      - ./config:/app/config:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  admin-ui:
    build:
      context: ./admin-ui
      args:
        VITE_ADMIN_KEY: ${MODELMESH_GATEWAY_ADMIN_KEY:-dev-admin-key}
    image: modelmesh-admin:dev
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: modelmesh
      POSTGRES_USER: modelmesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "modelmesh"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: Prometheus (uncomment to enable)
  # prometheus:
  #   image: prom/prometheus:latest
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  postgres_data:
